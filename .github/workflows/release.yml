name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Windows ist der kritische Pfad: baut die .exe, signiert und schreibt
  # latest.json. Verhaelt sich identisch zur bisherigen Single-Job-Version und
  # exponiert nur zusaetzlich die releaseId, damit der Mac-Job DASSELBE Release
  # wiederverwendet (kein paralleler create-release-Race mehr).
  build-windows:
    runs-on: windows-latest
    # Normaler Lauf ~11min — 40min faengt Haenger frueh, bevor sie den
    # (auf build-windows wartenden) macOS-Job stundenlang blockieren.
    timeout-minutes: 40
    outputs:
      release_id: ${{ steps.tauri.outputs.releaseId }}
    env:
      # Secret-Präsenz-Guard für Windows Code Signing (Issue #22): secrets.*
      # ist in step-level `if:` nicht direkt nutzbar, deshalb dieser
      # Zwischenschritt auf Job-Ebene. Der Guard prüft BEIDE Secrets: Fehlt nur
      # das Passwort, würde `ConvertTo-SecureString -String ""` im Step mit
      # einem Binding-Fehler abbrechen → build-windows failt → wegen `needs:`
      # kein Release. Solange nicht beide gesetzt sind, ist der Wert "false"
      # und der Signing-Step unten wird übersprungen (exaktes No-op).
      HAS_WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Auch bei Fehlschlag speichern: ein Re-Run desselben Tags restored
          # dann die kompilierten Deps statt ~10min neu zu bauen (v1.0.23:
          # zwei Notarize-Haenger, jeder Retry kompilierte von Null).
          cache-on-failure: true

      # -----------------------------------------------------------------------
      # Windows Code Signing (Authenticode) — VORBEREITUNG (Issue #22).
      # Aktuell existiert noch KEIN Zertifikat: solange die Secrets fehlen,
      # wird dieser Step übersprungen und der Workflow verhält sich exakt wie
      # bisher. Sobald ein Zertifikat vorliegt, hinterlegt der Maintainer im
      # Repo zwei Secrets:
      #
      #   WINDOWS_CERTIFICATE          — Code-Signing-Zertifikat inkl. Private
      #                                  Key als Base64-kodierte .pfx-Datei
      #                                  (erzeugen z.B. mit
      #                                  `base64 -w0 zertifikat.pfx`).
      #   WINDOWS_CERTIFICATE_PASSWORD — Passwort der .pfx-Datei.
      #
      # Der Step importiert die .pfx in den User-Zertifikatsspeicher des
      # Runners und schreibt certificateThumbprint / digestAlgorithm /
      # timestampUrl in eine NEUE Overlay-Datei src-tauri/tauri.windows.conf.json
      # (existiert nur im CI-Workspace, nie im Repo). Tauri v2 merged diese
      # Datei automatisch per JSON Merge Patch (RFC 7396) über die Haupt-Config:
      # Objekte werden rekursiv gemerged, d.h. der bestehende
      # bundle.windows.nsis-Block bleibt erhalten, nur die deklarierten Keys
      # kommen hinzu. Vorteil gegenüber einem In-Place-Patch: die eingecheckte
      # tauri.conf.json (trägt plugins.updater.pubkey) bleibt byte-identisch,
      # und der Step braucht kein node. `tauri build` signiert damit .exe und
      # NSIS-Installer via signtool, BEVOR die Updater-Artefakte entstehen —
      # die Minisign-Signatur (TAURI_SIGNING_PRIVATE_KEY) und latest.json
      # bleiben unberührt und gültig.
      # Achtung: timestampUrl ist eine harte, retry-lose Netzabhängigkeit —
      # ein transienter Ausfall von timestamp.digicert.com bricht den
      # Release-Lauf ab (bewusst akzeptiert; Recovery = Re-Run des Tags).
      # Referenzen: https://v2.tauri.app/distribute/sign/windows/
      #             https://v2.tauri.app/develop/configuration-files/
      - name: Import Windows code signing certificate (optional)
        if: env.HAS_WINDOWS_CERTIFICATE == 'true'
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          # Eine .pfx kann eine ganze Zertifikatskette enthalten — Import-PfxCertificate
          # liefert dann MEHRERE Zertifikate und .Thumbprint wäre ein Array (ungültiger
          # Wert für certificateThumbprint, signtool schlägt fehl). Deshalb: auf
          # Code-Signing-EKU (OID 1.3.6.1.5.5.7.3.3), Private Key und Gültigkeit
          # filtern; bei mehreren Treffern gewinnt das mit dem spätesten NotAfter.
          $certs = @(Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password)
          $cert = $certs |
            Where-Object { $_.HasPrivateKey -and $_.NotAfter -gt (Get-Date) -and ($_.Extensions.EnhancedKeyUsages.Value -contains '1.3.6.1.5.5.7.3.3') } |
            Sort-Object NotAfter -Descending |
            Select-Object -First 1
          if (-not $cert) { throw "Kein gültiges Code-Signing-Zertifikat (EKU 1.3.6.1.5.5.7.3.3, Private Key, nicht abgelaufen) in der .pfx gefunden." }
          Remove-Item $pfxPath
          $overlay = [ordered]@{
            bundle = [ordered]@{
              windows = [ordered]@{
                certificateThumbprint = $cert.Thumbprint
                digestAlgorithm       = "sha256"
                timestampUrl          = "http://timestamp.digicert.com"
              }
            }
          }
          $overlayPath = Join-Path $env:GITHUB_WORKSPACE "src-tauri/tauri.windows.conf.json"
          # UTF-8 OHNE BOM schreiben: serde_json (Tauri-CLI) lehnt eine BOM ab,
          # und Out-File/Set-Content -Encoding utf8 schreibt je nach PS-Edition
          # eine — deshalb explizit über WriteAllText.
          [IO.File]::WriteAllText($overlayPath, ($overlay | ConvertTo-Json -Depth 5), [Text.UTF8Encoding]::new($false))
          Write-Host "Zertifikat importiert (Thumbprint: $($cert.Thumbprint)), Overlay tauri.windows.conf.json für signtool geschrieben."

      - name: Build Windows app and create release
        id: tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          UPDATER_GITHUB_TOKEN: ${{ secrets.UPDATER_GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Smashq ${{ github.ref_name }}"
          releaseBody: |
            Siehe CHANGELOG.md fuer Details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  # Regeneriert docs/developer-doc.html und committed das Ergebnis zurueck auf
  # master. Best-effort: schlaegt der Push fehl (z.B. Branch-Protection), fehlt
  # nur der aktualisierte Doc-Stand im Repo — Release und Updater sind unberuehrt.
  refresh-design-doc:
    needs: build-windows
    runs-on: ubuntu-latest
    # Normaler Lauf <1min; best-effort-Job, darf nie lange blockieren.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Regenerate design section
        run: npm run docs:design

      - name: Commit refreshed developer-doc.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/developer-doc.html
          git diff --staged --quiet || git commit -m "docs: refresh design section [skip ci]"
          git push || true

  # Mac laeuft NACH Windows (needs:) und haengt SIGNIERTE + NOTARISIERTE Artefakte
  # ins selbe Release. Der Job produziert jetzt auch Updater-Artefakte
  # (.app.tar.gz + .sig) und merged die darwin-Eintraege in die von build-windows
  # angelegte latest.json. tauri-action FETCHT die bestehende latest.json und
  # MERGED die Plattformen (uploadVersionJSON) -> die Windows-Eintraege bleiben
  # erhalten, kein Ueberschreiben. Schlaegt der Mac-Job fehl, ist das
  # Windows-Release + Updater bereits publiziert und unberuehrt.
  build-macos:
    needs: build-windows
    runs-on: macos-latest
    # Normaler Lauf 8-13min (Universal-Compile + Notarize). Apples
    # Notarize-Polling kann bei Runner-Netzwerkabriss ENDLOS haengen
    # (tauri-action exponiert kein notarytool-Timeout; GitHub-Default waere
    # 6h) — v1.0.23 hing so 4h als Zombie auf 10x-abgerechneten
    # macOS-Minuten. 60min = klarer Fail statt Haenger, dann Re-Run.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Siehe build-windows: Retry desselben Tags soll warm starten.
          cache-on-failure: true

      # Developer-ID-Zertifikat in eine temporaere Keychain importieren, damit
      # `codesign` es findet. Base64-Secret dekodieren -> .p12 -> import. Die
      # Keychain existiert nur fuer diesen Job-Run.
      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          rm -f certificate.p12

      - name: Build, sign, notarize macOS app + updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Minisign (Updater-Integritaet) - derselbe Key wie Windows.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID (Gatekeeper) - Code-Signierung.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarisierung: greift NUR, wenn APPLE_ID + APPLE_PASSWORD + APPLE_TEAM_ID
          # alle gesetzt sind. Fehlt APPLE_PASSWORD, wird signiert aber nicht notarisiert.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          # Haengt sich an das von build-windows erzeugte Release.
          releaseId: ${{ needs.build-windows.outputs.release_id }}
          # universal-Binary -> ein .app.tar.gz deckt beide Archs ab. `app` MUSS in
          # den Bundles sein, damit createUpdaterArtifacts (aus tauri.conf.json) das
          # .app.tar.gz erzeugen kann; `dmg` bleibt der Erst-Installer.
          args: "--target universal-apple-darwin --bundles app,dmg"
          # true -> merged die darwin-Eintraege in die bestehende latest.json.
          includeUpdaterJson: true
