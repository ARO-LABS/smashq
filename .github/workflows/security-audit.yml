name: Security Audit

on:
  push:
    branches: [master]
  schedule:
    # Wöchentlich Montag 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Blocking gate: fail on high/critical vulnerabilities in PRODUCTION deps
      # (what actually ships in the desktop bundle). Dev-only tooling advisories
      # (vitest/vite/esbuild) do not reach users and would otherwise pin the
      # gate permanently red, recreating the "audit never fails" problem.
      - name: Run npm audit (prod, high severity) — blocking
        run: npm audit --audit-level=high --omit=dev

      # Informational only: surface ALL advisories (incl. dev tooling) in the
      # logs without failing the job, so dev-side debt stays visible.
      - name: Run npm audit (full, informational)
        continue-on-error: true
        run: npm audit

  cargo-audit:
    name: cargo audit (rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Blocking gate: fail on Rust vulnerabilities. Unmaintained/unsound
      # advisories are reported as warnings (cargo audit does not fail on them
      # by default), so accepted transitive debt (gtk-rs GTK3 chain etc.) stays
      # visible without blocking. rustls-webpki was bumped to >=0.103.13 to clear
      # RUSTSEC-2026-0098/0099/0104.
      #
      # crossbeam-epoch (RUSTSEC-2026-0204) was bumped to >=0.9.20 in Cargo.lock.
      # quick-xml (RUSTSEC-2026-0194/0195, "upgrade to >=0.41.0") reaches the tree
      # on two independent paths; both were addressed as far as the lockfile allows:
      #   1. tauri -> plist: fixed by bumping plist 1.8.0 -> 1.10.0 (within tauri's
      #      `plist = "^1"`, so tauri 2.10.3 / the updater path is untouched), which
      #      pulls quick-xml 0.41.0. plist MUST stay >=1.10 or this regresses.
      #   2. tauri-plugin-clipboard-manager -> arboard -> wl-clipboard-rs ->
      #      wayland-client -> wayland-scanner 0.31.10, which pins `quick-xml = "^0.39"`.
      #      The whole chain is version-locked (arboard ^3, wl-clipboard-rs ^0.9.0,
      #      wayland-client ^0.31.11), so no lockfile bump can reach 0.41 until
      #      upstream wayland-scanner does. wayland-scanner uses quick-xml only to
      #      parse the Wayland *protocol XML at build time* — trusted, developer-
      #      controlled input, not the untrusted-XML DoS surface the advisories
      #      describe. Ignored here as non-exploitable build-time debt; drop the two
      #      --ignore flags once a reachable wayland-scanner ships quick-xml >=0.41.
      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit --ignore RUSTSEC-2026-0194 --ignore RUSTSEC-2026-0195
